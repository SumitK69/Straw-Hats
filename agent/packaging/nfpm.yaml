name: "sentinel-agent"
arch: "${ARCH}"
platform: "linux"
version: "${VERSION}"
section: "default"
priority: "extra"
replaces: []
provides:
  - "sentinel-agent"
depends: []
recommends: []
suggests: []
conflicts: []
maintainer: "Sentinel Team <support@sentinel.io>"
description: |
  Sentinel SIEM/XDR Agent
  The Sentinel Agent collects telemetry from endpoints and forwards it to the Sentinel Server.
vendor: "Sentinel"
homepage: "https://sentinel.io"
license: "Apache-2.0"
bindir: /opt/sentinel/bin
contents:
  - src: ../sentinel-agent
    dst: /opt/sentinel/bin/sentinel-agent
    file_info:
      mode: 0755
  - src: ../../deploy/sentinel-agent.yaml
    dst: /etc/sentinel/sentinel-agent.yaml
    type: config
    file_info:
      mode: 0644

scripts:
  postinstall: ./scripts/postinstall.sh
  preremove: ./scripts/preremove.sh
