name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Cross-compile Agent Binaries ──────────────────────────────────
  build-agent:
    name: Build Agent
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        working-directory: agent
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o sentinel-agent-${{ matrix.suffix }} ./cmd/sentinel-agent
      - uses: actions/upload-artifact@v4
        with:
          name: sentinel-agent-${{ matrix.suffix }}
          path: agent/sentinel-agent-${{ matrix.suffix }}

  # ── Build Docker Images ──────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Server Image
        run: docker build -t sentinel-server:${{ github.ref_name }} server/
      - name: Build Dashboard Image
        run: docker build -t sentinel-dashboard:${{ github.ref_name }} dashboard/
      - name: Build Anomaly Engine Image
        run: docker build -t sentinel-anomaly-engine:${{ github.ref_name }} anomaly-engine/

  # ── Create GitHub Release ────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-agent, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
