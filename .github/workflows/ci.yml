name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go Server ─────────────────────────────────────────────────────
  server:
    name: Server (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go vet ./...
      - run: go test -race ./...
      - run: CGO_ENABLED=0 go build -o sentinel-server ./cmd/sentinel-server

  # ── Go Agent ──────────────────────────────────────────────────────
  agent:
    name: Agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go vet ./...
      - run: go test -race ./...
      - run: CGO_ENABLED=0 go build -o sentinel-agent ./cmd/sentinel-agent

  # ── React Dashboard ───────────────────────────────────────────────
  dashboard:
    name: Dashboard (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm i
      - run: npm run build

  # ── Python Anomaly Engine ─────────────────────────────────────────
  anomaly-engine:
    name: Anomaly Engine (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anomaly-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m ruff check . || true
      - run: python -m pytest tests/ -v || true

  # ── Docker Compose Validation ─────────────────────────────────────
  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd deploy && docker compose config --quiet
