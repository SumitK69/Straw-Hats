# ─── Sentinel SIEM/XDR — Docker Compose Stack ─────────────────────────
# Single-command deployment: docker compose up -d
# All services, pre-tuned for a 4GB+ RAM machine.

services:
  # ── Sentinel Server (Go) ──────────────────────────────────────────
  sentinel-server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: sentinel-server
    restart: unless-stopped
    ports:
      - "${GRPC_PORT:-4222}:4222"    # Agent gRPC ingest
      - "${REST_PORT:-8443}:8443"    # REST + WebSocket API
    environment:
      - SENTINEL_GRPC_PORT=4222
      - SENTINEL_REST_PORT=8443
      - SENTINEL_OPENSEARCH_ADDRESSES=https://opensearch:9200
      - SENTINEL_OPENSEARCH_USERNAME=${OPENSEARCH_USER:-admin}
      - SENTINEL_OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-Sentinel_P@ss_2025}
      - SENTINEL_CA_CERT_DIR=/var/sentinel/certs
      - SENTINEL_NATS_EMBEDDED=true
      - SENTINEL_NATS_DATA_DIR=/var/sentinel/nats
      - SENTINEL_JWT_SIGNING_KEY=${JWT_SECRET:-change-me-in-production}
    volumes:
      - sentinel-certs:/var/sentinel/certs
      - sentinel-nats:/var/sentinel/nats
    networks:
      - sentinel-net
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8443/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── OpenSearch ────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: sentinel-opensearch
    restart: unless-stopped
    environment:
      - cluster.name=sentinel-cluster
      - node.name=sentinel-node-1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:-Sentinel_P@ss_2025}
      - plugins.security.disabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - sentinel-net
    ports:
      - "9200:9200"  # Expose for debugging; remove in production
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200 -u admin:${OPENSEARCH_PASSWORD:-Sentinel_P@ss_2025} | grep -q 'sentinel-cluster'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ── Sentinel Dashboard (React + nginx) ───────────────────────────
  sentinel-dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: sentinel-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    networks:
      - sentinel-net
    depends_on:
      sentinel-server:
        condition: service_healthy

  # ── Anomaly Engine (Python + FastAPI) ────────────────────────────
  anomaly-engine:
    build:
      context: ../anomaly-engine
      dockerfile: Dockerfile
    container_name: sentinel-anomaly-engine
    restart: unless-stopped
    ports:
      - "50051:50051"  # Internal only in production
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import httpx; r=httpx.get('http://localhost:50051/health'); exit(0 if r.status_code==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  opensearch-data:
    driver: local
  sentinel-certs:
    driver: local
  sentinel-nats:
    driver: local

# ── Network ──────────────────────────────────────────────────────────
networks:
  sentinel-net:
    driver: bridge
